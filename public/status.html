<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a6bff'/><path d='M12 8l12 8-12 8V8z' fill='white'/></svg>"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Status — BlueTube</title>
<style>:root{--bg:#020817;--text:#e8f4ff;--dim:rgba(150,190,230,.4);--neon:#00aaff;--green:#22c55e;--red:#ef4444;--yellow:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;padding:40px 20px}
.wrap{max-width:640px;margin:0 auto}.back{display:inline-block;margin-bottom:24px;color:var(--dim);text-decoration:none;font-size:13px}.back:hover{color:var(--neon)}
h1{font-size:28px;font-weight:800;margin-bottom:4px}.sub{font-size:13px;color:var(--dim);margin-bottom:28px}
.status-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:100px;font-size:14px;font-weight:700;margin-bottom:28px}
.status-badge.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.status-badge.degraded{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--yellow)}
.status-badge.down{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.dot{width:10px;height:10px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card{background:rgba(10,22,40,.8);border:1px solid rgba(0,170,255,.1);border-radius:14px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.card-name{font-size:14px;font-weight:600}.card-status{display:flex;align-items:center;gap:8px;font-size:12px;font-family:monospace}
.updated{font-size:12px;color:var(--dim);margin-top:20px;text-align:center}
</style></head><body><div class="wrap">
<a href="/" class="back">← Voltar ao BlueTube</a>
<h1>Status do sistema</h1>
<p class="sub">Atualiza automaticamente a cada 30 segundos</p>
<div id="badge" class="status-badge ok"><span class="dot" style="background:var(--green)"></span> Verificando...</div>
<div id="services"></div>
<div class="updated" id="updated">Verificando...</div>
</div>
<script>
async function check(){
  try{
    const r=await fetch('/api/health');
    const d=await r.json();
    const b=document.getElementById('badge');
    const allOk=Object.values(d.services||{}).every(Boolean);
    b.className='status-badge '+(allOk?'ok':'degraded');
    b.innerHTML='<span class="dot" style="background:var(--'+(allOk?'green':'yellow')+')"></span> '+(allOk?'Todos os sistemas operacionais':'Degradação parcial');
    const map={supabase:'Banco de dados',openai:'Geração de roteiros',gemini:'IA Gemini (fallback)',elevenlabs:'BlueVoice (narração)',stripe:'Pagamentos',anthropic:'Monitor de erros'};
    document.getElementById('services').innerHTML=Object.entries(d.services||{}).map(([k,v])=>{
      const c=v?'var(--green)':'var(--red)';
      return'<div class="card"><div class="card-name">'+(map[k]||k)+'</div><div class="card-status"><span class="dot" style="background:'+c+'"></span><span style="color:'+c+'">'+(v?'Online':'Offline')+'</span></div></div>';
    }).join('');
    document.getElementById('updated').textContent='Atualizado: '+new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    document.getElementById('badge').className='status-badge down';
    document.getElementById('badge').innerHTML='<span class="dot" style="background:var(--red)"></span> Não foi possível verificar';
  }
}
check();setInterval(check,30000);
</script></body></html>
