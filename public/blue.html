<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Blue</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;font-family:-apple-system,sans-serif;overflow:hidden;color:#fff}

/* FEED */
#feed{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:412px;
  overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;
  background:#000}
#feed::-webkit-scrollbar{display:none}
/* Fundo escuro nas laterais no desktop */
body::before{content:'';position:fixed;inset:0;background:#0a0a0a;z-index:-1}

.slide{position:relative;width:100%;height:100vh;scroll-snap-align:start;scroll-snap-stop:always;background:#000}
.slide video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* OVERLAY */
.grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 40%,rgba(0,0,0,.2) 100%);pointer-events:none}
.info{position:absolute;left:12px;right:80px;bottom:20px}
.info-user{font-size:15px;font-weight:700;margin-bottom:4px}
.info-title{font-size:14px;opacity:.85;margin-bottom:4px}
.info-desc{font-size:13px;opacity:.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.actions{position:absolute;right:12px;bottom:20px;display:flex;flex-direction:column;gap:16px;align-items:center}
.act{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:#fff}
.act-ico{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform .15s}
.act-ico:active{transform:scale(.85)}
.act-ico.red{background:rgba(239,68,68,.3)}
.act-lbl{font-size:10px;font-weight:600}
.prog{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.2)}
.prog-fill{height:100%;background:#3b82f6;width:0}

/* TOP BAR */
.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:412px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);pointer-events:none}
.logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,#3b82f6,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;pointer-events:all;text-decoration:none}
.topbtns{display:flex;gap:8px;pointer-events:all}
.tbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;backdrop-filter:blur(8px)}

/* UPLOAD MODAL */
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.modal-box{width:100%;max-width:500px;background:#181818;border-radius:20px 20px 0 0;padding:24px 20px 36px;max-height:90vh;overflow-y:auto}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mt{font-size:18px;font-weight:700}
.mx{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer}
.drop{border:2px dashed rgba(255,255,255,.2);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s}
.drop:hover,.drop.ov{border-color:#3b82f6;background:rgba(59,130,246,.08)}
.drop input{display:none}
.drop-icon{font-size:36px;margin-bottom:10px}
.drop-lbl{font-size:15px;font-weight:600;margin-bottom:4px}
.drop-sub{font-size:12px;color:#aaa}
.prev-row{display:none;gap:12px;align-items:center;margin:14px 0;padding:12px;background:rgba(255,255,255,.05);border-radius:12px}
.prev-thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#333;display:flex;align-items:center;justify-content:center;font-size:24px}
.prev-info{font-size:12px;color:#aaa;line-height:1.7}
.mfield{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 14px;font-size:14px;color:#fff;outline:none;margin-bottom:10px;font-family:inherit;resize:none}
.mfield:focus{border-color:#3b82f6}
.mfield::placeholder{color:#555}
.mprog{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin:10px 0;display:none;overflow:hidden}
.mprog-fill{height:100%;background:#3b82f6;width:0;transition:width .3s}
.mmsg{font-size:12px;text-align:center;margin-bottom:8px;min-height:16px;color:#aaa}
.mmsg.ok{color:#4ade80}.mmsg.err{color:#f87171}
.mpub{width:100%;background:#3b82f6;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s}
.mpub:hover:not(:disabled){background:#2563eb}
.mpub:disabled{opacity:.4;cursor:not-allowed}

/* EMPTY */
.empty{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:32px;display:none}
.empty.on{display:flex}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#222;border-radius:8px;padding:9px 18px;font-size:13px;opacity:0;transition:all .25s;z-index:999;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}

/* MUTE INDICATOR */
.mute-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.6);border-radius:50%;width:56px;height:56px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:5}
.mute-hint.show{opacity:1}

/* VIEWS */
.slide-views{position:absolute;top:14px;left:14px;z-index:10;
  background:rgba(0,0,0,.5);border-radius:100px;padding:4px 10px;
  font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}

/* COMMENTS PANEL */
.comments-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:412px;height:70vh;background:#111;border-radius:20px 20px 0 0;
  z-index:300;transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.comments-panel.open{transform:translateX(-50%) translateY(0)}
.cp-header{padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #222}
.cp-title{font-size:15px;font-weight:700}
.cp-close{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;line-height:1}
.cp-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:14px}
.cp-list::-webkit-scrollbar{display:none}
.cp-item{display:flex;gap:10px}
.cp-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.cp-body{}
.cp-user{font-size:12px;font-weight:700;margin-bottom:2px}
.cp-text{font-size:14px;line-height:1.45;color:#e0e0e0}
.cp-time{font-size:11px;color:#555;margin-top:3px}
.cp-empty{text-align:center;padding:40px 20px;color:#555;font-size:13px}
.cp-input-row{padding:12px 16px;border-top:1px solid #222;display:flex;gap:8px;align-items:flex-end}
.cp-input{flex:1;background:#222;border:1px solid #333;border-radius:20px;padding:10px 14px;
  font-size:14px;color:#fff;outline:none;resize:none;max-height:80px;
  font-family:-apple-system,sans-serif;line-height:1.4}
.cp-input::placeholder{color:#555}
.cp-send{background:#3b82f6;border:none;border-radius:50%;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  font-size:16px;transition:background .2s}
.cp-send:hover{background:#2563eb}
.cp-send:disabled{background:#333;cursor:not-allowed}
.comments-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299}
.comments-backdrop.on{display:block}
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="/blue.html">Blue</a>
  <div class="topbtns">
    <button class="tbtn" onclick="openUpload()">+ Postar</button>
    <a class="tbtn" href="/">BlueTube</a>
  </div>
</div>

<div id="feed"></div>

<div class="empty" id="empty">
  <div style="font-size:48px">📹</div>
  <div style="font-size:20px;font-weight:700">Nenhum vídeo ainda</div>
  <div style="font-size:13px;color:#aaa;margin-bottom:4px">Seja o primeiro criador do Blue!</div>
  <button onclick="runDiag()" style="background:none;border:1px solid #333;border-radius:8px;padding:6px 14px;color:#555;font-size:11px;cursor:pointer;margin-top:8px">🔍 Verificar sistema</button>
  <button class="tbtn" onclick="openUpload()" style="pointer-events:all;margin-top:8px">+ Publicar vídeo</button>
  <div id="dbgMsg" style="margin-top:20px;font-size:11px;color:#444;font-family:monospace;max-width:300px;word-break:break-all"></div>
</div>

<!-- UPLOAD -->
<div class="modal" id="modal" onclick="if(event.target===this)closeUpload()">
  <div class="modal-box">
    <div class="mh">
      <div class="mt">📹 Publicar vídeo</div>
      <button class="mx" onclick="closeUpload()">✕</button>
    </div>

    <div id="authWall" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:36px;margin-bottom:12px">🔒</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">Entre para publicar</div>
      <div style="font-size:13px;color:#aaa;margin-bottom:18px">Use a mesma conta do BlueTube</div>
      <a href="/?signup=1" style="display:block;background:#3b82f6;border-radius:12px;padding:12px;font-weight:700;color:#fff;text-decoration:none;margin-bottom:8px">Criar conta grátis →</a>
      <a href="/" style="display:block;background:rgba(255,255,255,.08);border-radius:12px;padding:12px;font-weight:700;color:#fff;text-decoration:none">Já tenho conta — Entrar</a>
    </div>

    <div id="upForm">
      <div class="drop" id="drop" onclick="document.getElementById('fin').click()"
           ondragover="event.preventDefault();this.classList.add('ov')"
           ondragleave="this.classList.remove('ov')"
           ondrop="dropFile(event)">
        <input type="file" id="fin" accept="video/*" onchange="pickFile(this.files[0])"/>
        <div class="drop-icon" id="dico">🎬</div>
        <div class="drop-lbl" id="dlbl">Toque para selecionar o vídeo</div>
        <div class="drop-sub">MP4, MOV, WebM · qualquer tamanho</div>
      </div>
      <div class="prev-row" id="prevrow">
        <div class="prev-thumb" id="pthumb">🎬</div>
        <div class="prev-info" id="pinfo"></div>
      </div>
      <input class="mfield" id="ftitle" type="text" placeholder="Título (obrigatório)" maxlength="80"/>
      <textarea class="mfield" id="fdesc" rows="2" placeholder="Descrição (opcional)" maxlength="300"></textarea>
      <div class="mprog" id="mprog"><div class="mprog-fill" id="mfill"></div></div>
      <div class="mmsg" id="mmsg"></div>
      <button class="mpub" id="mpub" disabled onclick="publish()">Selecione um vídeo</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="comments-backdrop" id="commentsBackdrop" onclick="closeComments()"></div>
<div class="comments-panel" id="commentsPanel">
  <div class="cp-header">
    <div class="cp-title">Comentários <span id="cpCount" style="color:#555;font-weight:400"></span></div>
    <button class="cp-close" onclick="closeComments()">✕</button>
  </div>
  <div class="cp-list" id="cpList">
    <div class="cp-empty">Carregando…</div>
  </div>
  <div class="cp-input-row">
    <textarea class="cp-input" id="cpInput" placeholder="Adicione um comentário…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendComment();}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
    <button class="cp-send" id="cpSend" onclick="sendComment()">↑</button>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('bt_token');

async function getValidToken() {
  // Tenta refresh se tiver refresh token
  const refresh = localStorage.getItem('bt_refresh_token');
  if (!TOKEN && !refresh) return null;
  if (TOKEN) {
    // Testa se o token ainda é válido
    try {
      const r = await fetch('/api/blue-profile?token=' + encodeURIComponent(TOKEN));
      if (r.ok) return TOKEN;
    } catch(e) {}
  }
  // Token inválido — tenta renovar
  if (refresh) {
    try {
      const r = await fetch('/api/auth', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'refresh', refresh_token: refresh })
      });
      if (r.ok) {
        const d = await r.json();
        const newToken = d.session?.access_token || d.access_token;
        const newRefresh = d.session?.refresh_token || d.refresh_token;
        if (newToken) {
          TOKEN = newToken;
          localStorage.setItem('bt_token', newToken);
          if (newRefresh) localStorage.setItem('bt_refresh_token', newRefresh);
          return TOKEN;
        }
      }
    } catch(e) {}
  }
  return null;
}
const SID = localStorage.getItem('bl_s') || (()=>{const s='s'+Date.now().toString(36);localStorage.setItem('bl_s',s);return s;})();
let videos=[], liked=new Set(JSON.parse(localStorage.getItem('bl_liked')||'[]')), saved=new Set(JSON.parse(localStorage.getItem('bl_saved')||'[]'));
let selFile=null, thumbB64=null, vDur=0, vW=1080, vH=1920;
let obs=null;

// LOAD FEED
async function loadFeed(){
  const feed = document.getElementById('feed');
  feed.innerHTML='<div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><div style="width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite"></div><div style="font-size:12px;color:#666">Carregando…</div></div>';
  try{
    const r = await fetch('/api/blue-feed?limit=20&session='+SID);
    if(!r.ok){ const t=await r.text(); showErr('API retornou '+r.status+': '+t.slice(0,80)); return; }
    const d = await r.json();
    videos = (d.videos||[]).filter(v=>v&&v.video_url);
    console.log('Feed loaded:', videos.length, 'videos');
  }catch(e){ showErr('Erro de rede: '+e.message); return; }
  
  feed.innerHTML='';
  if(videos.length===0){
    document.getElementById('empty').classList.add('on');
    return;
  }
  document.getElementById('empty').classList.remove('on');
  videos.forEach((v,i)=>feed.appendChild(makeSlide(v,i)));
  setupObs();
}

async function runDiag(){
  const el=document.getElementById('dbgMsg');
  if(el){el.style.color='#666';el.textContent='Verificando...';}
  try{
    const r=await fetch('/api/blue-debug');
    const d=await r.json();
    const msg=JSON.stringify(d,null,2);
    if(el){el.style.color='#888';el.textContent=msg;}
    console.log('Blue diag:',d);
  }catch(e){if(el)el.textContent='Erro: '+e.message;}
}

function showDbg(msg){ const el=document.getElementById('dbgMsg'); if(el)el.textContent=msg; }

function showErr(msg){
  document.getElementById('feed').innerHTML =
    '<div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center">' +
    '<div style="font-size:36px">⚠️</div>' +
    '<div style="font-size:14px;color:#f87171">' + msg + '</div>' +
    '<button onclick="loadFeed()" style="background:#3b82f6;border:none;border-radius:8px;padding:10px 20px;color:#fff;font-size:13px;cursor:pointer;margin-top:8px">Tentar novamente</button>' +
    '</div>';
}

function makeSlide(v,i){
  if(!v||!v.video_url){return document.createElement('div');} // skip invalid
  const c=v.creator||{};
  const lk=liked.has(v.id);
  const sv=saved.has(v.id);
  const el=document.createElement('div');
  el.className='slide'; el.id='s-'+v.id; el.dataset.id=v.id; el.dataset.i=i;
  el.innerHTML=`
    <video src="${v.video_url}" preload="${i<2?'auto':'none'}" loop playsinline muted
      poster="${v.thumbnail_url||''}" ontimeupdate="tick(this,'${v.id}')"
      onerror="this.closest('.slide').style.display='none'"></video>
    <div class="grad"></div>
    <div class="mute-hint" id="mh-${v.id}">🔇</div>
    <div class="slide-views">👁 <span id="vc-${v.id}">${fmt(v.views||0)}</span></div>
    <div class="info">
      <div class="info-user">@${c.username||'blue'}</div>
      ${v.title?`<div class="info-title">${v.title}</div>`:''}
      ${v.description?`<div class="info-desc">${v.description}</div>`:''}
    </div>
    <div class="actions">
      <button class="act" onclick="doLike('${v.id}')">
        <div class="act-ico ${lk?'red':''}" id="li-${v.id}">${lk?'❤️':'🤍'}</div>
        <div class="act-lbl" id="lc-${v.id}">${fmt(v.likes||0)}</div>
      </button>
      <button class="act" onclick="doSave('${v.id}')">
        <div class="act-ico" id="si-${v.id}">${sv?'🔖':'💾'}</div>
        <div class="act-lbl">Salvar</div>
      </button>
      <button class="act" onclick="openComments('${v.id}',${v.comments||0})">
        <div class="act-ico">💬</div>
        <div class="act-lbl" id="cc-${v.id}">${fmt(v.comments||0)}</div>
      </button>
      <button class="act" onclick="doShare('${v.video_url||''}','${(v.title||'').replace(/'/g,'')}')">
        <div class="act-ico">↗️</div>
        <div class="act-lbl">Comp.</div>
      </button>
    </div>
    <div class="prog"><div class="prog-fill" id="pf-${v.id}"></div></div>`;
  // Tap no vídeo — toggle mute (primeiro toque ativa som, depois pausa/retoma)
  const vidEl = el.querySelector('video');
  vidEl.addEventListener('click', ()=> toggleSound(vidEl, v.id));
  return el;
}

function setupObs(){
  if(obs) obs.disconnect();
  obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const sl=e.target, vid=sl.querySelector('video');
      if(!vid) return;
      if(e.isIntersecting && e.intersectionRatio>.6){
        document.querySelectorAll('#feed video').forEach(v=>{ if(v!==vid){v.pause();v.currentTime=0;} });
        vid.preload='auto';
        // iOS: sempre começa muted, desmuta após interação do usuário
        if(!_userInteracted) { vid.muted=true; showMuteHint(sl.dataset.id); }
        else { vid.muted=false; }
        vid.play().catch(()=>{ vid.muted=true; vid.play().catch(()=>{}); });
        // Incrementa view counter localmente
        const vcEl=document.getElementById('vc-'+sl.dataset.id);
        if(vcEl) vcEl.textContent=fmt((parseInt(vcEl.textContent.replace(/[^0-9]/g,''))||0)+1);
        // Preload next
        const ni=parseInt(sl.dataset.i)+1;
        if(videos[ni]){ const ns=document.getElementById('s-'+videos[ni].id); if(ns){const nv=ns.querySelector('video');if(nv)nv.preload='auto';} }
        ping('view',sl.dataset.id);
      } else { if(!vid.paused) vid.pause(); }
    });
  },{threshold:.6});
  document.querySelectorAll('.slide').forEach(s=>obs.observe(s));
}

function tick(vid,id){
  if(!vid.duration)return;
  const el=document.getElementById('pf-'+id);
  if(el) el.style.width=(vid.currentTime/vid.duration*100)+'%';
}

function doLike(id){
  const ico=document.getElementById('li-'+id), ct=document.getElementById('lc-'+id);
  if(liked.has(id)){liked.delete(id);ico.textContent='🤍';ico.classList.remove('red');ct.textContent=fmt(Math.max(0,parseInt(ct.textContent)||0)-1);ping('unlike',id);}
  else{liked.add(id);ico.textContent='❤️';ico.classList.add('red');ct.textContent=fmt((parseInt(ct.textContent)||0)+1);ping('like',id);toast('❤️ Curtido!');}
  localStorage.setItem('bl_liked',JSON.stringify([...liked]));
}
function doSave(id){
  const ico=document.getElementById('si-'+id);
  if(saved.has(id)){saved.delete(id);ico.textContent='💾';ping('unsave',id);toast('Removido');}
  else{saved.add(id);ico.textContent='🔖';ping('save',id);toast('💾 Salvo!');}
  localStorage.setItem('bl_saved',JSON.stringify([...saved]));
}
async function doShare(url,title){
  if(navigator.share){try{await navigator.share({title,url});}catch(e){}}
  else{await navigator.clipboard.writeText(url).catch(()=>{});toast('🔗 Copiado!');}
}
let _userInteracted = false;
let _currentCommentsVideo = null;

function toggleSound(vid, id) {
  _userInteracted = true;
  vid.muted = !vid.muted;
  if (vid.paused) { vid.play().catch(()=>{}); }
  showMuteHint(id, !vid.muted);
}

function showMuteHint(id, unmuted) {
  const el = document.getElementById('mh-'+id);
  if (!el) return;
  el.textContent = unmuted === false ? '🔇' : (unmuted ? '🔊' : '🔇');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 800);
}

// Comments
function openComments(videoId, count) {
  _currentCommentsVideo = videoId;
  document.getElementById('commentsPanel').classList.add('open');
  document.getElementById('commentsBackdrop').classList.add('on');
  document.getElementById('cpCount').textContent = count > 0 ? '('+fmt(count)+')' : '';
  loadComments(videoId);
  setTimeout(()=>document.getElementById('cpInput').focus(), 400);
}

function closeComments() {
  document.getElementById('commentsPanel').classList.remove('open');
  document.getElementById('commentsBackdrop').classList.remove('on');
}

async function loadComments(videoId) {
  const list = document.getElementById('cpList');
  list.innerHTML = '<div class="cp-empty">Carregando…</div>';
  try {
    const r = await fetch('/api/blue-comment?video_id='+videoId+'&limit=50');
    const d = await r.json();
    const comments = d.comments || [];
    if (comments.length === 0) {
      list.innerHTML = '<div class="cp-empty">Nenhum comentário ainda.<br>Seja o primeiro! 💬</div>';
      return;
    }
    list.innerHTML = comments.map(c => {
      const u = c.creator || {};
      const init = (u.display_name||u.username||'?').charAt(0).toUpperCase();
      const ago = timeAgo(c.created_at);
      return '<div class="cp-item">' +
        '<div class="cp-av">'+init+'</div>' +
        '<div class="cp-body">' +
          '<div class="cp-user">@'+(u.username||'usuário')+'</div>' +
          '<div class="cp-text">'+escHtml(c.text)+'</div>' +
          '<div class="cp-time">'+ago+'</div>' +
        '</div></div>';
    }).join('');
  } catch(e) { list.innerHTML = '<div class="cp-empty">Erro ao carregar.</div>'; }
}

async function sendComment() {
  const input = document.getElementById('cpInput');
  const text = input.value.trim();
  if (!text || !_currentCommentsVideo) return;
  if (!TOKEN) { toast('Entre para comentar'); closeComments(); return; }
  const btn = document.getElementById('cpSend');
  btn.disabled = true;
  try {
    const r = await fetch('/api/blue-comment', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, video_id: _currentCommentsVideo, text })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error||'Erro');
    input.value = ''; input.style.height = 'auto';
    // Adiciona comentário no topo da lista
    const list = document.getElementById('cpList');
    const empty = list.querySelector('.cp-empty');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'cp-item';
    div.innerHTML = '<div class="cp-av">V</div><div class="cp-body"><div class="cp-user">@você</div><div class="cp-text">'+escHtml(text)+'</div><div class="cp-time">agora</div></div>';
    list.insertBefore(div, list.firstChild);
    // Atualiza contador
    const cc = document.getElementById('cc-'+_currentCommentsVideo);
    if (cc) cc.textContent = fmt((parseInt(cc.textContent.replace(/[^0-9]/g,''))||0)+1);
    const cpCount = document.getElementById('cpCount');
    if (cpCount) cpCount.textContent = '('+((parseInt(cpCount.textContent.replace(/[^0-9]/g,''))||0)+1)+')';
  } catch(e) { toast('Erro: '+e.message); }
  btn.disabled = false;
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function ping(type,id){ fetch('/api/blue-interact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,video_id:id,session_id:SID})}).catch(()=>{}); }

// UPLOAD
function openUpload(){
  document.getElementById('modal').classList.add('on');
  document.getElementById('authWall').style.display = TOKEN?'none':'block';
  document.getElementById('upForm').style.display = TOKEN?'block':'none';
}
function closeUpload(){ document.getElementById('modal').classList.remove('on'); }
function dropFile(e){ e.preventDefault();e.currentTarget.classList.remove('ov');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('video/'))pickFile(f); }

function pickFile(file){
  if(!file)return;
  // Avisa se muito grande mas deixa tentar (o Supabase decide)
  const mb = Math.round(file.size/1024/1024);
  if(file.size > 2000*1024*1024) {
    toast('❌ Arquivo maior que 2GB — não suportado'); return;
  }
  if(mb > 200) toast('⚠️ Arquivo grande ('+mb+'MB) — pode demorar');
  selFile=file;
  const url=URL.createObjectURL(file);
  const tv=document.createElement('video'); tv.src=url; tv.muted=true;
  tv.onloadedmetadata=()=>{ vDur=tv.duration;vW=tv.videoWidth;vH=tv.videoHeight; tv.currentTime=.5; };
  tv.onseeked=()=>{
    const c=document.createElement('canvas');
    c.width=Math.min(tv.videoWidth,480); c.height=Math.round(c.width*(tv.videoHeight/tv.videoWidth));
    c.getContext('2d').drawImage(tv,0,0,c.width,c.height);
    // Comprime thumbnail agressivamente (max 200KB para não estourar Vercel)
    let q=0.6; thumbB64=c.toDataURL('image/jpeg',q);
    while(thumbB64.length>200000&&q>0.1){q-=0.1;thumbB64=c.toDataURL('image/jpeg',q);}
    document.getElementById('pthumb').innerHTML=`<img src="${thumbB64}" style="width:72px;height:72px;object-fit:cover;border-radius:10px"/>`;
  };
  document.getElementById('dico').textContent='✅';
  document.getElementById('dlbl').textContent=file.name.slice(0,40);
  document.getElementById('pinfo').innerHTML=`<b>${file.name.slice(0,30)}</b><br>${(file.size/1024/1024).toFixed(1)}MB`;
  document.getElementById('prevrow').style.display='flex';
  const btn=document.getElementById('mpub'); btn.disabled=false; btn.textContent='Publicar →';
  if(!document.getElementById('ftitle').value) document.getElementById('ftitle').value=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
}

async function publish(){
  if(!selFile)return;
  const title=document.getElementById('ftitle').value.trim();
  if(!title){toast('Adicione um título');return;}
  const desc=document.getElementById('fdesc').value.trim();
  const btn=document.getElementById('mpub'), msg=document.getElementById('mmsg');
  const prog=document.getElementById('mprog'), fill=document.getElementById('mfill');
  btn.disabled=true; btn.textContent='Verificando…';
  prog.style.display='block'; fill.style.width='3%';
  msg.className='mmsg ok'; msg.textContent='Verificando sessão…';

  // Garante token válido antes de tentar upload
  const validToken = await getValidToken();
  if (!validToken) {
    closeUpload();
    msg.textContent='';prog.style.display='none';btn.disabled=false;btn.textContent='Publicar →';
    toast('Sessão expirada — faça login novamente');
    setTimeout(()=>window.location.href='/?signin=1', 1500);
    return;
  }

  btn.textContent='Publicando…'; fill.style.width='5%'; msg.textContent='Preparando…';

  try{
    // Passo 1: API salva metadados e retorna destino de upload
    msg.textContent='Salvando…'; fill.style.width='10%';
    const r1=await fetch('/api/blue-upload',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:validToken,title,description:desc,duration:vDur,width:vW,height:vH,
        file_name:selFile.name,thumbnail_data:thumbB64})});
    const d1=await r1.json();
    if(!r1.ok)throw new Error(d1.error||'Erro: '+r1.status);

    fill.style.width='15%'; msg.textContent='Enviando vídeo…';

    // Passo 2: upload direto para Supabase Storage (bypassa Vercel - sem limite)
    const upUrl=d1.supabase_url+'/storage/v1/object/blue-videos/'+d1.storage_path;
    const fileMB=Math.round(selFile.size/1024/1024);
    msg.textContent='Enviando vídeo ('+fileMB+'MB)…';
    await new Promise((res,rej)=>{
      const xhr=new XMLHttpRequest();
      xhr.upload.onprogress=e=>{ if(e.lengthComputable)fill.style.width=(15+e.loaded/e.total*80)+'%'; };
      xhr.onload=()=>{
        console.log('Upload:',xhr.status,xhr.responseText.slice(0,200));
        if(xhr.status<300){res();}
        else if(xhr.status===400&&xhr.responseText.includes('413')){
          rej(new Error('Arquivo grande demais — vá em Supabase Dashboard → Project Settings → Storage → aumente o File Size Limit para 5000MB'));
        }else{
          rej(new Error('Upload HTTP '+xhr.status+': '+xhr.responseText.slice(0,100)));
        }
      };
      xhr.onerror=()=>rej(new Error('Falha de rede'));
      xhr.open('PUT',upUrl);
      xhr.setRequestHeader('apikey',d1.anon_key);
      xhr.setRequestHeader('Authorization','Bearer '+validToken);
      const ct = selFile.type || 'video/mp4';
      xhr.setRequestHeader('Content-Type', ct);
      xhr.setRequestHeader('x-upsert','true');
      xhr.setRequestHeader('cache-control','3600');
      xhr.send(selFile);
    });

    fill.style.width='100%'; msg.textContent='✅ Publicado!'; btn.textContent='✅ Pronto!';
    toast('🎬 Vídeo publicado!');
    const newVid=d1.video||{id:'',video_url:'',thumbnail_url:'',title,description:desc,views:0,likes:0,saves:0};
    newVid.creator={}; videos.unshift(newVid);
  }catch(err){
    msg.className='mmsg err';msg.textContent=err.message;
    btn.disabled=false;btn.textContent='Tentar novamente';
    fill.style.width='0%';prog.style.display='none';
  }
}

function fmt(n){n=parseInt(n)||0;return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n);}
let _tt;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('on'),2500);}
document.addEventListener('keydown',e=>{const f=document.getElementById('feed');if(e.key==='ArrowDown')f.scrollBy({top:window.innerHeight,behavior:'smooth'});if(e.key==='ArrowUp')f.scrollBy({top:-window.innerHeight,behavior:'smooth'});});

loadFeed();
</script>
