<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a6bff'/><path d='M12 8l12 8-12 8V8z' fill='white'/></svg>"/>
<title>Blue Monetizacao</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#020817;--card:rgba(10,22,40,.85);--neon:#3b82f6;--text:#e8f4ff;--dim:rgba(150,190,230,.4);--green:#22c55e;--gold:#fbbf24;--red:#ef4444;--purple:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:10;background:rgba(2,8,23,.95);backdrop-filter:blur(12px);padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(59,130,246,.1)}
nav a{color:var(--neon);text-decoration:none;font-size:18px}
nav h1{font-size:16px;font-weight:800}
.content{max-width:600px;margin:0 auto;padding:20px 16px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px;text-align:center}
.card-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.card-value{font-size:24px;font-weight:800;letter-spacing:-1px}
.card-sub{font-size:10px;color:var(--dim);margin-top:4px}
.section{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:22px;margin-bottom:16px}
.sec-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-green{background:linear-gradient(135deg,#16a34a,var(--green));color:#fff;box-shadow:0 0 20px rgba(34,197,94,.3)}
.btn-blue{background:linear-gradient(135deg,#1d4ed8,var(--neon));color:#fff;box-shadow:0 0 20px rgba(59,130,246,.3)}
.btn-gold{background:linear-gradient(135deg,#B8860B,var(--gold));color:#000;box-shadow:0 0 20px rgba(251,191,36,.3)}
.input{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;font-family:inherit;margin-bottom:12px}
.input:focus{border-color:rgba(59,130,246,.4)}
.input::placeholder{color:var(--dim)}
.feature-cards{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:20px}
.feat{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px;display:flex;gap:14px;align-items:flex-start}
.feat-icon{font-size:28px;flex-shrink:0}
.feat-title{font-size:14px;font-weight:700;margin-bottom:4px}
.feat-desc{font-size:12px;color:var(--dim);line-height:1.5}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;color:var(--dim);text-transform:uppercase;padding:8px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.03)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px}
.badge-gorjeta{background:rgba(251,191,36,.1);color:var(--gold)}
.badge-fundo{background:rgba(59,130,246,.1);color:var(--neon)}
.badge-saque{background:rgba(34,197,94,.1);color:var(--green)}
.chart-wrap{height:180px;position:relative;margin-top:12px}
.fundo-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.fs{text-align:center;background:rgba(255,255,255,.03);border-radius:10px;padding:12px}
.fs-label{font-size:10px;color:var(--dim);margin-bottom:4px}
.fs-value{font-size:18px;font-weight:800}
.msg{font-size:12px;text-align:center;margin-top:10px;min-height:16px}
.msg.ok{color:var(--green)}.msg.err{color:var(--red)}
.loader{text-align:center;padding:60px;color:var(--dim)}
@media(max-width:500px){.cards{grid-template-columns:1fr}}

#addProdModalMonet.open{display:flex !important}
</style>
<script src="/_ref-tracker.js" defer></script>
</head>
<body>
<nav>
  <a href="/blue">&larr;</a>
  <h1>💰 Monetizacao</h1>
</nav>
<div class="content" id="main"><div class="loader">Carregando…</div></div>

<script>
const TOKEN=localStorage.getItem('bt_token');
if(!TOKEN){window.location.href='/blue';}
const params=new URLSearchParams(window.location.search);

async function load(){
  try{
    const r=await fetch('/api/blue-monetizacao?action=status&token='+encodeURIComponent(TOKEN));
    const d=await r.json();
    if(d.error){document.getElementById('main').innerHTML='<div class="loader" style="color:var(--red)">'+d.error+'</div>';return;}
    if(!d.tem_conta) renderSetup();
    else if(!d.onboarding_completo) renderPendingSetup();
    else renderDashboard(d);
  }catch(e){document.getElementById('main').innerHTML='<div class="loader">Erro: '+e.message+'</div>';}
}

function renderSetup(){
  document.getElementById('main').innerHTML=`
    <div style="text-align:center;padding:20px 0 30px">
      <div style="font-size:48px;margin-bottom:12px">💰</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:6px">Comece a ganhar com seus videos</div>
      <div style="font-size:13px;color:var(--dim)">Minimo 100 seguidores para ativar</div>
    </div>
    <div class="feature-cards">
      <div class="feat"><div class="feat-icon">🎁</div><div><div class="feat-title">Gorjetas</div><div class="feat-desc">Receba presentes dos fas em tempo real durante lives e em videos</div></div></div>
      <div class="feat"><div class="feat-icon">💎</div><div><div class="feat-title">Fundo de Criadores</div><div class="feat-desc">10% da receita do Blue distribuido todo mes proporcionalmente as suas views</div></div></div>
      <div class="feat"><div class="feat-icon">⭐</div><div><div class="feat-title">Assinatura do canal</div><div class="feat-desc">Fas pagam por conteudo exclusivo (em breve)</div></div></div>
    </div>
    <button class="btn btn-gold" onclick="criarConta()">Configurar conta de pagamento &rarr;</button>
    <div class="msg" id="setupMsg"></div>`;
}

function renderPendingSetup(){
  document.getElementById('main').innerHTML=`
    <div style="text-align:center;padding:40px 0">
      <div style="font-size:48px;margin-bottom:12px">⏳</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:8px">Finalize seu cadastro</div>
      <div style="font-size:13px;color:var(--dim);margin-bottom:20px">Complete o setup da conta Stripe para receber pagamentos</div>
      <button class="btn btn-blue" onclick="criarConta()">Continuar setup &rarr;</button>
      <div class="msg" id="setupMsg"></div>
    </div>`;
}

function renderDashboard(d){
  const f=d.fundo||{};
  document.getElementById('main').innerHTML=`
    <div class="cards">
      <div class="card"><div class="card-label">Disponivel</div><div class="card-value" style="color:var(--green)">R$${d.saldo_disponivel.toFixed(2)}</div><div class="card-sub">para saque</div></div>
      <div class="card"><div class="card-label">Pendente</div><div class="card-value" style="color:var(--gold)">R$${d.saldo_pendente.toFixed(2)}</div><div class="card-sub">processando</div></div>
      <div class="card"><div class="card-label">Total recebido</div><div class="card-value">R$${d.total_recebido.toFixed(2)}</div><div class="card-sub">historico</div></div>
    </div>

    <div class="section">
      <div class="sec-title">💸 Sacar</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:10px">Minimo R$20,00 · Cai em ate 2 dias uteis</div>
      <input class="input" id="saqueValor" type="number" step="0.01" min="20" placeholder="Valor (R$)" value="${d.saldo_disponivel>=20?d.saldo_disponivel.toFixed(2):''}"/>
      <button class="btn btn-green" onclick="sacar()" ${d.saldo_disponivel<20?'disabled':''}>Sacar agora &rarr;</button>
      <div class="msg" id="saqueMsg">${d.saldo_disponivel<20?'<span style="color:var(--dim)">Saldo minimo R$20,00 para saque</span>':''}</div>
    </div>

    <div class="section">
      <div class="sec-title">💎 Fundo de Criadores — ${f.mes||'este mes'}</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:12px">10% da receita mensal distribuido proporcionalmente as views</div>
      <div class="fundo-stats">
        <div class="fs"><div class="fs-label">Suas views</div><div class="fs-value" style="color:var(--neon)">${fmt(f.minhas_views||0)}</div></div>
        <div class="fs"><div class="fs-label">Total plataforma</div><div class="fs-value">${fmt(f.views_totais||0)}</div></div>
        <div class="fs"><div class="fs-label">Seu %</div><div class="fs-value" style="color:var(--gold)">${(f.meu_percentual||0).toFixed(1)}%</div></div>
        <div class="fs"><div class="fs-label">Proxima dist.</div><div class="fs-value" style="font-size:12px;color:var(--dim)">1o do mes</div></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">📋 Transacoes recentes</div>
      <div id="transacoesTable"><div style="color:var(--dim);font-size:12px;text-align:center">Carregando…</div></div>
    </div>

    <div class="section">
      <div class="sec-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>🛍️ Minha Loja</span>
        <button onclick="document.getElementById('addProdModalMonet').classList.add('open')" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:12px;font-weight:600;cursor:pointer">+ Produto</button>
      </div>
      <div id="lojaProdsList"><div style="color:var(--dim);font-size:12px;text-align:center;padding:16px">Carregando...</div></div>
    </div>`;

  loadTransacoes();
  loadShopMonet();
}

async function criarConta(){
  const msg=document.getElementById('setupMsg');
  if(msg) msg.textContent='Criando conta…';
  try{
    const r=await fetch('/api/blue-monetizacao',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'criar-conta',token:TOKEN})});
    const d=await r.json();
    if(!r.ok){if(msg)msg.innerHTML='<span class="err">'+d.error+'</span>';return;}
    if(d.onboarding_url) window.location.href=d.onboarding_url;
  }catch(e){if(msg)msg.innerHTML='<span class="err">Erro: '+e.message+'</span>';}
}

async function sacar(){
  const valor=parseFloat(document.getElementById('saqueValor').value);
  const msg=document.getElementById('saqueMsg');
  if(!valor||valor<20){msg.innerHTML='<span class="err">Minimo R$20,00</span>';return;}
  if(!confirm('Sacar R$'+valor.toFixed(2)+'?'))return;
  msg.textContent='Processando…';
  try{
    const r=await fetch('/api/blue-monetizacao',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'sacar',token:TOKEN,valor})});
    const d=await r.json();
    if(!r.ok){msg.innerHTML='<span class="err">'+d.error+'</span>';return;}
    msg.innerHTML='<span class="ok">Saque de R$'+valor.toFixed(2)+' processado!</span>';
    setTimeout(load,2000);
  }catch(e){msg.innerHTML='<span class="err">Erro: '+e.message+'</span>';}
}

async function loadTransacoes(){
  try{
    const r=await fetch('/api/blue-monetizacao?action=historico&token='+encodeURIComponent(TOKEN));
    const d=await r.json();
    const list=d.transacoes||[];
    const el=document.getElementById('transacoesTable');
    if(!list.length){el.innerHTML='<div style="color:var(--dim);font-size:12px;text-align:center;padding:16px">Nenhuma transacao ainda</div>';return;}
    el.innerHTML=`<table><thead><tr><th>Tipo</th><th>Valor</th><th>Data</th></tr></thead><tbody>${list.map(t=>{
      const badge=t.tipo==='gorjeta'?'badge-gorjeta':t.tipo==='fundo'?'badge-fundo':'badge-saque';
      const label=t.tipo==='gorjeta'?(t.emoji||'🎁')+' Gorjeta':t.tipo==='fundo'?'💎 Fundo':'💸 Saque';
      const color=t.valor>=0?'var(--green)':'var(--red)';
      return`<tr><td><span class="badge ${badge}">${label}</span></td><td style="font-weight:700;color:${color}">R$${Math.abs(t.valor).toFixed(2)}</td><td style="color:var(--dim)">${new Date(t.data).toLocaleDateString('pt-BR')}</td></tr>`;
    }).join('')}</tbody></table>`;
  }catch(e){}
}

function fmt(n){n=parseInt(n)||0;return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n);}

// Auto-load on return from Stripe
if(params.get('setup')==='ok') setTimeout(load,500);
else load();


async function loadShopMonet(){
  const el=document.getElementById('lojaProdsList');
  if(!el)return;
  try{
    const r=await fetch('/api/blue-shop?action=meus-produtos&token='+encodeURIComponent(TOKEN));
    const d=await r.json();
    const prods=d.produtos||[];
    if(!prods.length){el.innerHTML='<div style="color:var(--dim);font-size:12px;text-align:center;padding:16px">Nenhum produto ainda</div>';return;}
    el.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="color:var(--dim)"><th style="text-align:left;padding:6px 4px">Produto</th><th style="padding:6px 4px">Pre\u00E7o</th><th style="padding:6px 4px">Vendas</th><th style="padding:6px 4px">Receita</th></tr></thead><tbody>'+
      prods.map(p=>`<tr style="border-top:1px solid rgba(255,255,255,.06)"><td style="padding:8px 4px;font-weight:600">${p.nome||'Produto'}</td><td style="padding:8px 4px;text-align:center;color:var(--gold)">R$${parseFloat(p.preco||0).toFixed(2)}</td><td style="padding:8px 4px;text-align:center">${p.total_vendas||0}</td><td style="padding:8px 4px;text-align:center;color:var(--green)">R$${parseFloat(p.receita_total||0).toFixed(2)}</td></tr>`).join('')+
    '</tbody></table>';
  }catch(e){el.innerHTML='<div style="color:var(--dim);font-size:12px;text-align:center">Erro ao carregar</div>';}
}

async function addProdMonet(){
  const nome=(document.getElementById('apNome')?.value||'').trim();
  const desc=(document.getElementById('apDesc')?.value||'').trim();
  const preco=parseFloat(document.getElementById('apPreco')?.value||0);
  const tipo=document.getElementById('apTipo')?.value||'digital';
  const msg=document.getElementById('apMsg');
  if(!nome){if(msg)msg.textContent='Digite um nome';return;}
  if(!preco||preco<=0){if(msg)msg.textContent='Pre\u00E7o inv\u00E1lido';return;}
  if(msg)msg.textContent='Publicando\u2026';
  try{
    const r=await fetch('/api/blue-shop',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'criar-produto',nome,descricao:desc,preco,tipo,token:TOKEN})});
    const d=await r.json();
    if(!r.ok){if(msg)msg.textContent=d.error||'Erro';return;}
    document.getElementById('addProdModalMonet').classList.remove('open');
    loadShopMonet();
  }catch(e){if(msg)msg.textContent='Erro';}
}
</script>

<!-- Modal adicionar produto -->
<div id="addProdModalMonet" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center" onclick="if(event.target===this)this.classList.remove('open')" class="">
  <div style="background:#161620;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px">
    <div style="font-size:17px;font-weight:800;color:#fff;margin-bottom:14px">Adicionar produto <button onclick="document.getElementById('addProdModalMonet').classList.remove('open')" style="float:right;background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer">&#x2715;</button></div>
    <input id="apNome" placeholder="Nome" style="width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;margin-bottom:8px;outline:none;box-sizing:border-box"/>
    <textarea id="apDesc" placeholder="Descri&#x00E7;&#x00E3;o" rows="2" style="width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;margin-bottom:8px;outline:none;box-sizing:border-box;resize:none"></textarea>
    <input id="apPreco" placeholder="Pre&#x00E7;o (R$)" type="number" step="0.01" min="0" style="width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;margin-bottom:8px;outline:none;box-sizing:border-box"/>
    <select id="apTipo" style="width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;margin-bottom:12px;outline:none;box-sizing:border-box"><option value="digital">Digital</option><option value="fisico">F&#x00ED;sico</option></select>
    <button onclick="addProdMonet()" style="width:100%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:12px;padding:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Publicar produto</button>
    <div id="apMsg" style="color:rgba(255,255,255,.6);font-size:12px;margin-top:8px;text-align:center"></div>
  </div>
</div>
</body>
</html>
