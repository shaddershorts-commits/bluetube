<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a6bff'/><path d='M12 8l12 8-12 8V8z' fill='white'/></svg>"/>
<title>Blue Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#020817;--card:rgba(10,22,40,.85);--neon:#3b82f6;--text:#e8f4ff;--dim:rgba(150,190,230,.4);--green:#22c55e;--red:#ef4444;--yellow:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:10;background:rgba(2,8,23,.95);backdrop-filter:blur(12px);padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(59,130,246,.1)}
nav a{color:var(--neon);text-decoration:none;font-size:18px}
nav h1{font-size:16px;font-weight:800}
.content{max-width:800px;margin:0 auto;padding:16px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.card{background:var(--card);border:1px solid rgba(59,130,246,.1);border-radius:14px;padding:16px;text-align:center}
.card-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.card-value{font-size:24px;font-weight:800;letter-spacing:-1px}
.card-sub{font-size:11px;color:var(--dim);margin-top:4px}
.section{background:var(--card);border:1px solid rgba(59,130,246,.1);border-radius:14px;padding:20px;margin-bottom:16px}
.sec-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;padding:8px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text)}
tr:hover td{background:rgba(59,130,246,.03)}
.vid-row{cursor:pointer}
.vid-thumb{width:48px;height:64px;border-radius:6px;object-fit:cover;background:#111}
.heatmap{display:grid;grid-template-columns:auto repeat(24,1fr);gap:2px;font-size:9px}
.hm-cell{width:100%;aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,.4)}
.hm-label{display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;color:var(--dim)}
.chart-wrap{height:200px;position:relative}
.empty{text-align:center;padding:40px;color:var(--dim)}
.loader{text-align:center;padding:60px;color:var(--dim)}
.period-btns{display:flex;gap:6px;margin-bottom:16px}
.period-btn{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--dim);cursor:pointer}
.period-btn.active{background:rgba(59,130,246,.2);border-color:var(--neon);color:var(--neon)}
.best-hours{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.best-hour{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--green)}
/* Retention modal */
.ret-modal{position:fixed;inset:0;z-index:100;background:rgba(2,8,23,.9);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px}
.ret-modal.on{display:flex}
.ret-card{background:#0a1628;border:1px solid rgba(59,130,246,.2);border-radius:20px;padding:28px;max-width:500px;width:100%}
.ret-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr)}}
</style>
<script src="/_ref-tracker.js" defer></script>
</head>
<body>
<nav>
  <a href="/blue">&larr;</a>
  <h1>📊 Analytics</h1>
</nav>

<div class="content" id="main">
  <div class="loader" id="loader">Carregando analytics…</div>
</div>

<!-- Retention detail modal -->
<div class="ret-modal" id="retModal">
  <div class="ret-card" style="position:relative">
    <button class="ret-close" onclick="document.getElementById('retModal').classList.remove('on')">&times;</button>
    <div class="sec-title" id="retTitle">Retenção</div>
    <div class="chart-wrap"><canvas id="retChart"></canvas></div>
    <div id="retInfo" style="margin-top:12px;font-size:12px;color:var(--dim)"></div>
  </div>
</div>

<script>
const TOKEN=localStorage.getItem('bt_token');
if(!TOKEN){window.location.href='/blue';throw new Error('no token');}

let _data=null, _periodo=28, _retChartInst=null, _origemChartInst=null;

async function load(days){
  _periodo=days||28;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.d)===_periodo));
  const r=await fetch('/api/blue-feed?action=analytics-overview&token='+encodeURIComponent(TOKEN)+'&periodo='+_periodo);
  _data=await r.json();
  if(_data.error){document.getElementById('main').innerHTML='<div class="empty">Erro: '+_data.error+'</div>';return;}
  render();
}

function render(){
  const d=_data;
  const o=d.overview;
  const dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];

  document.getElementById('main').innerHTML=`
    <div class="period-btns">
      <button class="period-btn ${_periodo===7?'active':''}" data-d="7" onclick="load(7)">7 dias</button>
      <button class="period-btn ${_periodo===28?'active':''}" data-d="28" onclick="load(28)">28 dias</button>
      <button class="period-btn ${_periodo===90?'active':''}" data-d="90" onclick="load(90)">90 dias</button>
    </div>

    <div class="cards">
      <div class="card"><div class="card-label">Views</div><div class="card-value" style="color:var(--neon)">${fmt(o.totalViews)}</div><div class="card-sub">últimos ${_periodo} dias</div></div>
      <div class="card"><div class="card-label">Seguidores</div><div class="card-value" style="color:var(--green)">+${o.newFollowers}</div><div class="card-sub">${o.followerGrowth>0?'+':''}${o.followerGrowth}% vs anterior</div></div>
      <div class="card"><div class="card-label">Engajamento</div><div class="card-value" style="color:var(--yellow)">${o.engRate}%</div><div class="card-sub">(likes+comments)/views</div></div>
      <div class="card"><div class="card-label">Alcance</div><div class="card-value">${fmt(o.alcance)}</div><div class="card-sub">pessoas alcançadas</div></div>
    </div>

    <!-- Origem do tráfego -->
    <div class="section">
      <div class="sec-title">📍 Origem do tráfego</div>
      <div class="chart-wrap"><canvas id="origemChart"></canvas></div>
    </div>

    <!-- Performance por vídeo -->
    <div class="section">
      <div class="sec-title">🎬 Performance por vídeo</div>
      ${d.videos?.length?`<table>
        <thead><tr><th></th><th>Título</th><th>Views</th><th>Likes</th><th>Coment.</th><th>Retenção</th><th>Score</th></tr></thead>
        <tbody>${d.videos.map(v=>`<tr class="vid-row" onclick="openRetention('${v.id}','${(v.title||'').replace(/'/g,'')}')">
          <td><img class="vid-thumb" src="${v.thumbnail_url||''}" onerror="this.style.background='#222'"/></td>
          <td style="font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.title||'Sem título'}</td>
          <td>${fmt(v.views||0)}</td>
          <td>${fmt(v.likes||0)}</td>
          <td>${fmt(v.comments||0)}</td>
          <td style="color:${(v.completion_rate||0)>=50?'var(--green)':'var(--red)'}">${Math.round(v.completion_rate||0)}%</td>
          <td style="font-weight:700">${Math.round(v.score||0)}</td>
        </tr>`).join('')}</tbody>
      </table>`:'<div class="empty">Nenhum vídeo publicado ainda.</div>'}
    </div>

    <!-- Heatmap -->
    <div class="section">
      <div class="sec-title">🕐 Melhores horários para postar</div>
      <div class="heatmap" id="heatmapGrid"></div>
      ${d.bestHours?.length?`<div class="best-hours">${d.bestHours.map(bh=>`<div class="best-hour">${dayNames[bh.day]} ${bh.hour}h (${bh.count} views)</div>`).join('')}</div>`:''}
    </div>
  `;

  renderOrigemChart(d.origem);
  renderHeatmap(d.heatmap);
}

function renderOrigemChart(origem){
  const ctx=document.getElementById('origemChart');
  if(!ctx)return;
  const labels=Object.keys(origem||{});
  const data=Object.values(origem||{});
  const colors=['#3b82f6','#8b5cf6','#22c55e','#fbbf24','#ef4444','#06b6d4'];
  if(_origemChartInst)_origemChartInst.destroy();
  _origemChartInst=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors.slice(0,labels.length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#8899aa',font:{size:11}}}}}});
}

function renderHeatmap(hm){
  const el=document.getElementById('heatmapGrid');
  if(!el||!hm)return;
  const dayNames=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  const maxVal=Math.max(...hm.flat(),1);
  let html='<div></div>';
  for(let h=0;h<24;h++)html+=`<div style="text-align:center;font-size:9px;color:var(--dim)">${h}</div>`;
  for(let d=0;d<7;d++){
    html+=`<div class="hm-label">${dayNames[d]}</div>`;
    for(let h=0;h<24;h++){
      const val=hm[d][h];
      const intensity=val/maxVal;
      const bg=val===0?'rgba(255,255,255,.02)':`rgba(59,130,246,${(.1+intensity*.6).toFixed(2)})`;
      html+=`<div class="hm-cell" style="background:${bg}" title="${dayNames[d]} ${h}h: ${val} views">${val||''}</div>`;
    }
  }
  el.innerHTML=html;
}

async function openRetention(videoId,title){
  document.getElementById('retTitle').textContent='Retenção: '+(title||'Vídeo');
  document.getElementById('retModal').classList.add('on');
  document.getElementById('retInfo').textContent='Carregando…';
  try{
    const r=await fetch('/api/blue-feed?action=analytics-video&video_id='+videoId+'&token='+encodeURIComponent(TOKEN));
    const d=await r.json();
    const ret=d.retention||[];
    const ctx=document.getElementById('retChart');
    if(_retChartInst)_retChartInst.destroy();
    _retChartInst=new Chart(ctx,{type:'line',data:{labels:ret.map(r=>r.percentual+'%'),datasets:[{label:'Viewers (%)',data:ret.map(r=>r.pct),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:100,ticks:{color:'#556'},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'#556'},grid:{color:'rgba(255,255,255,.04)'}}},plugins:{legend:{display:false}}}});
    // Find drop-off point
    const dropOff=ret.find(r=>r.pct<50);
    document.getElementById('retInfo').innerHTML=`Total: ${d.total_views} views`+(dropOff?` · <span style="color:var(--red)">50% saiu em ${dropOff.percentual}%</span>`:'');
  }catch(e){document.getElementById('retInfo').textContent='Erro ao carregar';}
}

function fmt(n){n=parseInt(n)||0;return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n);}

load(28);
</script>
</body>
</html>
