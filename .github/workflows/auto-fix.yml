name: Auto-fix agent (Claude → PR)

# Substitui o Vercel Log Drain self-referential que estava causando loop de
# 1M hits/dia (~$68/mes). Agora roda a cada 30min consultando Vercel Logs
# API, e abre Pull Request em vez de commit direto (revisao humana).
#
# Schedule: */30 = a cada 30min, 48 execucoes/dia
# Concurrency: max 1 em paralelo (evita race em PRs)

on:
  schedule:
    # 2026-07-01 (revisao): reduzido de */30 pra */2h (:17 hora impar).
    #
    # SLA GH Actions nao aguenta */30 (11% cobertura). */2h bate ~85%.
    # Auto-fix analisa logs Vercel — nao urgente, tolera latencia 2-3h.
    # Ajustado SINCE_MINUTES pra 125 pra pegar 2h+buffer.
    - cron: '17 */2 * * *'
  workflow_dispatch:  # permite rodar manual em testes

concurrency:
  group: auto-fix-agent
  cancel-in-progress: false

permissions:
  contents: write          # criar branches + commits
  pull-requests: write     # abrir PRs

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run auto-fix agent
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE_MINUTES: '125'
          MAX_FIXES_PER_RUN: '3'
        run: node .github/scripts/auto-fix.mjs
