name: Auditoria stripe zumbis (cada 4h, auto-fix ativo)

# Migrado do Vercel pro GitHub Actions em 2026-06-25.
# Razao: Vercel Pro limit eh 40 crons. BlueTube tinha 58 -> ultimos 18 ignorados.
# GitHub Actions repos publicos = ilimitado e gratis.
#
# Atualizado 2026-06-25 com defesa em camadas (caso kevembeserra):
# - Frequencia: 9h UTC -> a cada 4h (6x/dia, janela max 4h)
# - auto_fix=1: detecta + cancela zumbis automaticamente (guardrail <=5)

on:
  schedule:
    # 2026-07-01: minuto :23 em vez de :00 pra evitar pico do GH Actions.
    - cron: '23 */4 * * *'
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispara endpoint com auto_fix
        run: |
          echo "Iniciando $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          HTTP=$(curl -sS --max-time 240 -o /tmp/resp.json -w "%{http_code}" "https://www.bluetubeviral.com/api/audit-stripe-zumbis?auto_fix=1&admin_secret=${{ secrets.ADMIN_SECRET }}")
          echo "HTTP: $HTTP"
          head -c 600 /tmp/resp.json
          echo ""
          if [ "$HTTP" != "200" ]; then
            echo "::error::HTTP $HTTP"
            exit 1
          fi
