name: TikTok Virais — Coleta (12x/dia)

# Dispara coleta de virais TikTok via endpoint Vercel a cada 2 horas.
# Substitui crons Vercel pra esse endpoint (limit 40 do Vercel Pro foi
# atingido; GitHub Actions roda gratuito).
#
# Volume esperado: 22 países × 12 coletas/dia ≈ 264 reqs/dia TikAPI
# (~88% da quota Starter 300/dia, margem 12% pra retries).

on:
  schedule:
    # A cada 2 horas no minuto 7: 00:07, 02:07, 04:07, 06:07, 08:07, 10:07,
    # 12:07, 14:07, 16:07, 18:07, 20:07, 22:07 UTC
    # 2026-06-29 (1ª vez): Mudado de "0 */3" pra "7 */3" — GH Actions tem alta
    # carga no minuto 0 (atrasos 1-2h, pulava 2-3 execs/dia). :07 sai do pico.
    # 2026-06-29 (2ª vez): Frequência 3h → 2h (8 → 12 coletas/dia). Permite
    # vídeos mais frescos (latência max 2h) sem estourar quota TikAPI.
    - cron: '7 */2 * * *'
  workflow_dispatch: {} # permite rodar manual quando precisar encher

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispara coleta TikTok Virais
        id: coleta
        run: |
          echo "Iniciando coleta às $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          # Fix 2026-06-25: -w "\n%{http_code}" -o /file gravava resposta no arquivo
          # MAS retornava "\n200" no stdout -> bash comparava "\n200" != "200" -> falsa
          # falha mesmo com HTTP 200 OK. Agora usa apenas %{http_code} sem newline.
          HTTP_CODE=$(curl -sS --max-time 150 \
            -w "%{http_code}" \
            -o /tmp/resp.json \
            "https://www.bluetubeviral.com/api/tiktok-virais?action=coletar&admin_secret=${{ secrets.ADMIN_SECRET }}")
          echo "HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Coleta falhou com HTTP $HTTP_CODE"
            cat /tmp/resp.json | head -c 500
            exit 1
          fi
          # Extrai resumo do JSON
          INSERTED=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('/tmp/resp.json','utf8'));console.log(d.total_inserted||0)}catch(e){console.log('?')}")
          FAILED=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('/tmp/resp.json','utf8'));console.log(d.total_failed||0)}catch(e){console.log('?')}")
          echo "✓ Coleta OK | inseridos: $INSERTED | falhas país: $FAILED"
          echo "inserted=$INSERTED" >> $GITHUB_OUTPUT

      - name: Resumo
        if: always()
        run: |
          echo "## TikTok Virais coleta — $(date -u +'%H:%M') UTC" >> $GITHUB_STEP_SUMMARY
          echo "Vídeos novos inseridos: ${{ steps.coleta.outputs.inserted }}" >> $GITHUB_STEP_SUMMARY
